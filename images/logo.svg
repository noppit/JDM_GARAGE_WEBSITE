<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 70" width="350" height="70">
  <!-- Background Shape (Slightly Angled Racing Flag Base) -->
  <path d="M 10 10 L 330 10 L 310 60 L 10 60 Z" fill="#111827" />
  
  <!-- Red Racing Accent Line -->
  <polygon points="15,15 28,15 18,55 5,55" fill="#dc2626" />
  <polygon points="32,15 42,15 32,55 22,55" fill="#dc2626" />

  <!-- Text: JDM -->
  <text x="50" y="48" font-family="'Kanit', sans-serif" font-weight="900" font-style="italic" font-size="38" fill="#ffffff" letter-spacing="2">JDM</text>
  
  <!-- Text: GARAGE -->
  <text x="145" y="48" font-family="'Kanit', sans-serif" font-weight="900" font-style="italic" font-size="38" fill="#dc2626" letter-spacing="1">GARAGE</text>
  
  <!-- Japanese Kanji Accent (Speed Style - 速度) -->
  <text x="315" y="42" font-family="'Kanit', sans-serif" font-weight="600" font-size="18" fill="#9ca3af">速</text>
</svg>
